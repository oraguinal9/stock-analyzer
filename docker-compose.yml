version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - EM_API_KEY=${EM_API_KEY:-}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/home"]
      interval: 30s
      timeout: 10s
      retries: 3

